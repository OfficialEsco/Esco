clear
//======================================\\
//  Counter-Strike Userconfig by Esco   \\
//======================================\\

//======================================\\
//            COMMON SETTINGS           \\
//======================================\\
fps_max "241"
fps_override "1"
cl_filterstuffcmd "1"
sensitivity "0.4"       // 1600 dpi * 0.4 sensitivity = 640 eDPI

//======================================\\
//            NETWORK SETTINGS          \\
//======================================\\
rate "100000"
cl_updaterate "100"
ex_interp "0.01"        // Interpolation 1/cl_updaterate (0 for automatic) or ping/1000?
cl_cmdrate "260"        // +5 your FPS?

//======================================\\
//             VIEW SETTINGS            \\
//======================================\\
cl_righthand "0"
hud_fastswitch "1"
_cl_autowepswitch "0"
hud_centerid "1"
hud_draw "1"

cl_dynamiccrosshair "0"

cl_crosshair_color "50 250 50"
cl_crosshair_size "small"
cl_crosshair_translucent "0"
cl_observercrosshair "1"

cl_radartype "1"

cl_bob "0"
cl_bobcycle "0.1"
cl_bobup "0"

//======================================\\
//        MOUSE / JOYSTICK SETTINGS     \\
//======================================\\
m_rawinput "1"
m_customaccel "0"
m_filter "0"            // Mouse filter smooths out mouse movements
cl_mousegrab "0"
gl_lowlatency "1"

joystick "0"

//======================================\\
//             VIDEO SETTINGS           \\
//======================================\\
cl_weather "0"
gl_vsync "0"
gl_ansio "16"
gl_polyoffset "4"   // (default=0.1/4) 0.1=Nvidia, 4=AMD
gl_fog "0"
gl_dither "0"
gl_overbright "1"       // Saturated lighting. Makes lighting more natural and realistic.

r_detailtextures "1"
r_mmx "1"               // toggles MMX calculations for MMX CPUs
r_mirroralpha "0"       // disables reflective surfaces

setinfo "_vgui_menus" "0"

cl_minmodels "1"
cl_min_ct "4"
cl_min_t "6"

//======================================\\
//               NETGRAPH               \\
//======================================\\
net_graphpos "2"
net_graphwidth "300"
graphheight "130"

//======================================\\
//                BINDS                 \\
//======================================\\
bind "p" "amxmodmenu"
unbind "mwheeldown"
bind "mwheeldown" "+jump"
unbind "mwheelup"
bind "mwheelup" "+duck"
bind "MOUSE5" "+voicerecord"

alias xhair "xhair_enable 1; xhair_alpha 1; xhair_color_b 0; xhair_color_g 255; xhair_color_r 0; xhair_gap -2.5; xhair_pad 1; xhair_size 2; xhair_thick 1"

//======================================\\
//                NUMPAD                \\
//======================================\\
// ~~~~~~~~~
// | 7 - 9 |
// ~~~~~~~~~
bind "KP_HOME" "p228; secammo"
bind "KP_UPARROW" "fiveseven; elites; secammo"
bind "KP_PGUP" "deagle; secammo"

// ~~~~~~~~~
// | 4 - 6 |
// ~~~~~~~~~
bind "KP_LEFTARROW" "awp; primammo"
bind "KP_5" "scout; primammo"
bind "KP_RIGHTARROW" "m3; primammo"

// ~~~~~~~~~
// | 1 - 3 |
// ~~~~~~~~~
bind "KP_END" "m4a1; ak47; primammo"
bind "KP_DOWNARROW" "famas; galil; primammo"
bind "KP_PGDN" "mp5; primammo"

// ~~~~~~~~~~
// | Around |
// ~~~~~~~~~~
bind "KP_MINUS" "sgren"
bind "KP_PLUS" "flash"
bind "KP_ENTER" "hegren"
bind "KP_DEL" "defuser"
bind "KP_INS" "vest; vesthelm"

//======================================\\
//               THE END                \\
//======================================\\
echo " Counter Strike Userconfig by Esco loaded "
echo "                                          "

//-stretchaspect for stretch
